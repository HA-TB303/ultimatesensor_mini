substitutions:
  device_name: "ultimatesensor-mini-01"
  friendly_name: "Ultimatesensor Mini"
  wake_word: "okay_nabu"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags: -DBOARD_HAS_PSRAM
    board_build.flash_mode: dio
    board_upload.maximum_size: 16777216

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: "y"
      CONFIG_ESP32_S3_BOX_BOARD: "y"
      CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM: "512"
      CONFIG_TCPIP_RECVMBOX_SIZE: "512"
      CONFIG_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_TCP_WND_DEFAULT: "512000"
      CONFIG_TCP_RECVMBOX_SIZE: "512"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password
  power_save_mode: light
  ap:
    ssid: "${device_name} Hotspot"
    password: !secret esphome_ap_password

captive_portal:

logger:
  level: DEBUG

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret ota_password

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: 'true'

bluetooth_proxy:
  active: true

## LD2450 UART + component
uart:
  id: uart_ld2450
  tx_pin: GPIO13
  rx_pin: GPIO14
  baud_rate: 256000
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 1024

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

## Configure I2C for the SGP40, SCD41 and BH1750 sensor
i2c:
  id: bus_a
  sda: GPIO11
  scl: GPIO10
  scan: true
  frequency: 100kHz

## esp status led
status_led:
  pin: GPIO19

# Scripts / LED handling
script:
  - id: reset_led
    then:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - light.turn_on:
                id: rgb_front_led
                blue: 100%
                red: 0%
                green: 0%
                brightness: 25%
                effect: none
          else:
            - light.turn_off: rgb_front_led

light:
  - platform: esp32_rmt_led_strip
    id: rgb_front_led
    name: "${friendly_name} Front LED"
    pin: GPIO05
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    rmt_symbols: 96
    default_transition_length: 0s
    effects:
      - addressable_color_wipe:
          name: "Connecting"
          colors:
            - red: 60%
              green: 60%
              blue: 60%
              num_leds: 1
            - red: 60%
              green: 60%
              blue: 0%
              num_leds: 1
          add_led_interval: 100ms
          reverse: true
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%

  - platform: esp32_rmt_led_strip
    id: rgb_back_led
    name: "${friendly_name} Back LED"
    pin: GPIO20
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    rmt_symbols: 96

## Audio: I2S in/out
i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO16
  - id: i2s_out
    i2s_lrclk_pin: GPIO8
    i2s_bclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    i2s_audio_id: i2s_in
    id: microphone_01
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 32bit

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_out
    id: speaker_id
    dac_type: external
    i2s_dout_pin: GPIO17
    sample_rate: 44100 

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input

  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input

  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    id: media_player_01
    name: "${friendly_name} Media Player"
    media_pipeline:
      speaker: media_spk_resampling_input
      num_channels: 1 
    announcement_pipeline:
      speaker: announcement_spk_resampling_input
      num_channels: 1

## Micro Wake Word + VA
micro_wake_word:
  id: mww
  models:
    - model: okay_nabu
    - model: hey_jarvis
    #- model: hey_mycroft

  on_wake_word_detected:
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 0%
        green: 100%
        brightness: 75%
        effect: "Slow Pulse"
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  microphone: microphone_01
  media_player: media_player_01
  micro_wake_word: mww
  use_wake_word: false
  auto_gain: 25dBFS
  noise_suppression_level: 1

  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - delay: 500ms  
    - if:
        condition:
          switch.is_on: use_wake_word
        then:
          - micro_wake_word.start:
          - script.execute: reset_led

  on_client_disconnected:
    - voice_assistant.stop
    - micro_wake_word.stop
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 100%
        green: 100%
        brightness: 50%

  on_listening:
    - light.turn_on:
        id: rgb_front_led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 50%
        effect: "Slow Pulse"

  on_tts_start:
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 0%
        green: 100%
        brightness: 50%
        effect: "Slow Pulse"

  on_end:
    then:
      - delay: 1s
      - wait_until:
          lambda: 'return id(media_player_01).state == media_player::MEDIA_PLAYER_STATE_IDLE;'
      - delay: 0.5s
      - light.turn_off: rgb_front_led
      - script.execute: reset_led
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - micro_wake_word.start:

  on_error:
    - light.turn_on:
        id: rgb_front_led
        blue: 0%
        red: 100%
        green: 0%
        brightness: 100%
        effect: none
    - delay: 1s
    - script.execute: reset_led

## LD2450 entities
binary_sensor:
  # LD2450 global presence states
  - platform: ld2450
    ld2450_id: ld2450_radar

    has_target:
      name: "${friendly_name} Presence"
      device_class: occupancy
      filters:
        - delayed_off: 1s

    has_moving_target:
      name: "${friendly_name} Motion"
      device_class: motion
      filters:
        - delayed_off: 1s

    has_still_target:
      name: "${friendly_name} Still Presence"
      device_class: occupancy
      filters:
        - delayed_off: 1s

  # Zone presence binary_sensors, gated by zone enable switches
  - platform: template
    id: zone_1_presence
    name: "${friendly_name} Zone 1 Presence"
    device_class: occupancy
    lambda: |-
      if (!id(zone_1_enabled).state) {
        return false;
      }
      return id(zone_1_target_count).state > 0;
    filters:
      - delayed_off: 1s

  - platform: template
    id: zone_2_presence
    name: "${friendly_name} Zone 2 Presence"
    device_class: occupancy
    lambda: |-
      if (!id(zone_2_enabled).state) {
        return false;
      }
      return id(zone_2_target_count).state > 0;
    filters:
      - delayed_off: 1s

  - platform: template
    id: zone_3_presence
    name: "${friendly_name} Zone 3 Presence"
    device_class: occupancy
    lambda: |-
      if (!id(zone_3_enabled).state) {
        return false;
      }
      return id(zone_3_target_count).state > 0;
    filters:
      - delayed_off: 1s

sensor:
  # Global counts
  - platform: ld2450
    ld2450_id: ld2450_radar

    target_count:
      name: "${friendly_name} Radar Target Count"
      filters:
        - throttle: 1s

    still_target_count:
      name: "${friendly_name} Radar Still Target Count"
      filters:
        - throttle: 1s

    moving_target_count:
      name: "${friendly_name} Radar Moving Target Count"
      filters:
        - throttle: 1s

    # Zone 1 counts 
    zone_1:
      target_count:
        id: zone_1_target_count
        name: "${friendly_name} Zone 1 Target Count"
        filters:
          - throttle: 1s

      still_target_count:
        id: zone_1_still_target_count
        name: "${friendly_name} Zone 1 Still Target Count"
        filters:
          - throttle: 1s

      moving_target_count:
        id: zone_1_moving_target_count
        name: "${friendly_name} Zone 1 Moving Target Count"
        filters:
          - throttle: 1s

    # Zone 2 counts
    zone_2:
      target_count:
        id: zone_2_target_count
        name: "${friendly_name} Zone 2 Target Count"
        filters:
          - throttle: 1s

      still_target_count:
        id: zone_2_still_target_count
        name: "${friendly_name} Zone 2 Still Target Count"
        filters:
          - throttle: 1s

      moving_target_count:
        id: zone_2_moving_target_count
        name: "${friendly_name} Zone 2 Moving Target Count"
        filters:
          - throttle: 1s

    # Zone 3 counts
    zone_3:
      target_count:
        id: zone_3_target_count
        name: "${friendly_name} Zone 3 Target Count"
        filters:
          - throttle: 1s

      still_target_count:
        id: zone_3_still_target_count
        name: "${friendly_name} Zone 3 Still Target Count"
        filters:
          - throttle: 1s

      moving_target_count:
        id: zone_3_moving_target_count
        name: "${friendly_name} Zone 3 Moving Target Count"
        filters:
          - throttle: 1s

  ## BH1750 Digital Ambient Light Sensor on I2C bus
  - platform: bh1750
    name: "${friendly_name} Illuminance"
    id: illuminance
    address: 0x23
    update_interval: 120s
  ## Configure the SGP40 Indoor air quality sensor (VOC)
  - platform: sgp4x
    voc:
      name: "${friendly_name} VOC Index"
    nox:
      name: "${friendly_name} NOx Index"
    compensation:
      humidity_source: scd41_humidity
      temperature_source: scd41_temperature
    update_interval: 120s
  ## Configure the SCD41 Co2 sensor on I2C bus
  - platform: scd4x
    id: my_scd41
    co2:
      name: "${friendly_name} CO2"
      id: scd41_co2
    temperature:
      name: "${friendly_name} Temperature"
      id: scd41_temperature
      filters:
        - lambda: return x + id(scd41_temperature_offset).state;
    humidity:
      name: "${friendly_name} Humidity"
      id: scd41_humidity
      filters:
        - lambda: return x + id(scd41_humidity_offset).state;
    measurement_mode: low_power_periodic
    temperature_offset: 2.3
    automatic_self_calibration: true
    update_interval: 60s
  ## SPS30 Particulate Matter (PM) Sensor
  - platform: sps30
    pm_1_0:
      name: "${friendly_name} PM <1µm Weight concentration"
      id: "PM_1_0"
    pm_2_5:
      name: "${friendly_name} PM <2.5µm Weight concentration"
      id: "PM_2_5"
    pm_4_0:
      name: "${friendly_name} PM <4µm Weight concentration"
      id: "PM_4_0"
    pm_10_0:
      name: "${friendly_name} PM <10µm Weight concentration"
      id: "PM_10_0"
    pmc_0_5:
      name: "${friendly_name} PM <0.5µm Number concentration"
      id: "PMC_0_5"
    pmc_1_0:
      name: "${friendly_name} PM <1µm Number concentration"
      id: "PMC_1_0"
    pmc_2_5:
      name: "${friendly_name} PM <2.5µm Number concentration"
      id: "PMC_2_5"
    pmc_4_0:
      name: "${friendly_name} PM <4µm Number concentration"
      id: "PMC_4_0"
    pmc_10_0:
      name: "${friendly_name} PM <10µm Number concentration"
      id: "PMC_10_0"
    pm_size:
      name: "${friendly_name} PM Typical Particle size"
      id: "pm_size"
    address: 0x69
    update_interval: 120s
    idle_interval: 300s

number:
  # Native LD2450 number component (internal)
  - platform: ld2450
    ld2450_id: ld2450_radar

    # Actual radar presence timeout in seconds
    presence_timeout:
      id: ld2450_presence_timeout
      internal: true

    # Zone 1 geometry (exposed)
    zone_1:
      x1:
        name: "${friendly_name} Zone 1 X1"
      y1:
        name: "${friendly_name} Zone 1 Y1"
      x2:
        name: "${friendly_name} Zone 1 X2"
      y2:
        name: "${friendly_name} Zone 1 Y2"

    # Zone 2 geometry
    zone_2:
      x1:
        name: "${friendly_name} Zone 2 X1"
      y1:
        name: "${friendly_name} Zone 2 Y1"
      x2:
        name: "${friendly_name} Zone 2 X2"
      y2:
        name: "${friendly_name} Zone 2 Y2"

    # Zone 3 geometry
    zone_3:
      x1:
        name: "${friendly_name} Zone 3 X1"
      y1:
        name: "${friendly_name} Zone 3 Y1"
      x2:
        name: "${friendly_name} Zone 3 X2"
      y2:
        name: "${friendly_name} Zone 3 Y2"

  # User-facing presence timeout with min/max/step
  - platform: template
    id: user_presence_timeout
    name: "${friendly_name} Presence Timeout"
    unit_of_measurement: "s"
    min_value: 1
    max_value: 600
    step: 1
    optimistic: true
    initial_value: 60

    set_action:
      then:
        - number.set:
            id: ld2450_presence_timeout
            value: !lambda 'return x;'

## temperature and humidity offsets
  - platform: template
    name: "${friendly_name} Temperature Offset"
    id: scd41_temperature_offset
    initial_value: 2.3
    min_value: -50.0
    max_value: 50.0
    step: 0.1
    entity_category: "CONFIG"
    unit_of_measurement: "°C"
    optimistic: true
    update_interval: never
    mode: box
  - platform: template
    name: "${friendly_name} Humidity Offset"
    id: scd41_humidity_offset
    restore_value: true
    initial_value: -1
    min_value: -50.0
    max_value: 50.0
    step: 0.1
    entity_category: "CONFIG"
    unit_of_measurement: "%"
    optimistic: true
    update_interval: never
    mode: box

text_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    version:
      name: "${friendly_name} Radar Firmware"
    mac_address:
      name: "${friendly_name} Radar BT MAC"

switch:
  # Template switch for VA enable
  - platform: template
    name: "Enable Voice Assistant"
    id: use_wake_word
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:assistant

    on_turn_on:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - voice_assistant.stop
            - delay: 1s
            - if:
                condition:
                  not:
                    - voice_assistant.is_running
                then:
                  - micro_wake_word.start:
      - script.execute: reset_led

    on_turn_off:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - voice_assistant.stop
            - micro_wake_word.stop
      - script.execute: reset_led

  # Zone enable switches (UI control for zones 1–3)
  - platform: template
    id: zone_1_enabled
    name: "${friendly_name} Zone 1 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: mdi:target-variant

  - platform: template
    id: zone_2_enabled
    name: "${friendly_name} Zone 2 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: mdi:target-variant

  - platform: template
    id: zone_3_enabled
    name: "${friendly_name} Zone 3 Enabled"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    icon: mdi:target-variant

  # LD2450 runtime toggles (including Multi Target)
  - platform: ld2450
    ld2450_id: ld2450_radar
    bluetooth:
      name: "${friendly_name} Radar Bluetooth"
    multi_target:
      name: "${friendly_name} Radar Multi Target"
